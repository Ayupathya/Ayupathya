<body class="bg-contact">

    <h1 class="logo">Ayupathya</h1>

  <main class="content contact-form">
    <h2>We'd Love to Hear From You!</h2>
    <p>Use the form below or contact us directly via phone or email.</p>

    <form action="#" method="post">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your Name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Your Email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>

      <button type="submit" class="btn-submit">Send Message</button>
    </form>

    <p class="contact-info">Email: info@ayupathya.com | Phone: +91-XXXXXXXXXX</p>
  </main>
